version: '3.8'

services:
  # FastAPI Backend
  backend:
    container_name: insights-backend
    build:
      context: .
      dockerfile: docker/backend.dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
    env_file:
      - .env.local
    environment:
      - FASTAPI_HOST=0.0.0.0
      - FASTAPI_PORT=8000
      - FASTAPI_ENV=development
      - DEBUG=true
      - SANDBOX_TIMEOUT=20
      - ALLOWED_ORIGINS=http://localhost:3000
    command: python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - insights-network
    depends_on:
      - postgres

  # PostgreSQL Database
  postgres:
    container_name: insights-postgres
    image: postgres:15
    ports:
      - "5433:5432"
    env_file:
      - .env.local
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - insights-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Next.js Frontend
  frontend:
    container_name: insights-frontend
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    networks:
      - insights-network
    depends_on:
      - backend

volumes:
  postgres-data:

networks:
  insights-network:
    driver: bridge
